services:
  - type: web
    name: student-dropout-predictor
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME  # Replace with your repo
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
